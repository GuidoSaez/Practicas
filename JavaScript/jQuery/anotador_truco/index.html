<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anotador de truco</title>
    <link rel="stylesheet" href="css/pantalla1.css" />
    <link rel="stylesheet" href="css/pantalla2.css" />
  </head>
  <body>
    <div class="visible" id="pant1">
      <input id="eq1" type="text" placeholder="Equipo 1: " />
      <input id="eq2" type="text" placeholder="Equipo 2: " />
      <input id="a24" type="button" value="a 24" />
      <input id="a30" type="button" value="a 30" />
      <input id="inicio" type="button" value="Iniciar" />
    </div>
    <div class="oculto" id="pant2">
      <div class="visor1">
        <input id="s1" type="button" value="+" />
        <input id="ne1" type="text" />
      </div>
      <div class="visor2">
        <input id="ne2" type="text" />
        <input id="s2" type="button" value="+" />
      </div>

      <div class="visor3">
        <img id="p11" src="img/0.png" />
        <img id="p12" src="img/0.png" />
        <img id="p13" src="img/0.png" />
      </div>
      <div class="visor4">
        <img id="p21" src="img/0.png" />
        <img id="p22" src="img/0.png" />
        <img id="p23" src="img/0.png" />
      </div>

      <div class="visor5">
        <img id="p14" src="img/0.png" />
        <img id="p15" src="img/0.png" />
        <img id="p16" src="img/0.png" />
      </div>
      <div class="visor6">
        <img id="p24" src="img/0.png" />
        <img id="p25" src="img/0.png" />
        <img id="p26" src="img/0.png" />
      </div>
      <div class="visor7">
        <input id="r1" type="button" value="-" />
        <input id="p1" type="text" />
        <input id="max" type="text" />
        <input id="fin" type="button" value="FIN" />
        <input id="p2" type="text" />
        <input id="r2" type="button" value="-" />
      </div>
    </div>

    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
